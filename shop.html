<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop luxury jewelry at Jay's Jewelries — filter by category, price, and popularity." />
  <title>Shop | Jay's Jewelries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <nav class="mobile-nav" id="mobile-nav"></nav>

  <main class="container shop-layout">
    <aside class="filters-sidebar" aria-label="Product filters">
      <h3>Filters</h3>
      <div class="filter-group">
        <h3>Category</h3>
        <label><input type="checkbox" name="category" value="necklaces" /> Necklaces</label>
        <label><input type="checkbox" name="category" value="bracelets" /> Bracelets</label>
        <label><input type="checkbox" name="category" value="rings" /> Rings</label>
        <label><input type="checkbox" name="category" value="earrings" /> Earrings</label>
        <label><input type="checkbox" name="category" value="watches" /> Watches</label>
        <label><input type="checkbox" name="category" value="accessories" /> Accessories</label>
      </div>
      <div class="filter-group">
        <h3>Price (GHS)</h3>
        <label>Min <input type="number" id="min-price" placeholder="0" min="0" /></label>
        <label>Max <input type="number" id="max-price" placeholder="5000" min="0" /></label>
      </div>
      <button type="button" class="btn btn-ghost btn-sm btn-block" id="clear-filters">Clear Filters</button>
    </aside>

    <div>
      <div class="page-hero-small" style="padding-top:0;text-align:left">
        <span class="eyebrow">Collection</span>
        <h1>Shop All Jewelry</h1>
      </div>
      <div class="shop-toolbar">
        <span id="product-count" class="text-muted">Loading...</span>
        <select id="sort-select" aria-label="Sort products">
          <option value="popularity">Most Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/products.js?v=2"></script>
  <script src="js/store.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
  <script>document.addEventListener("DOMContentLoaded", initShopPage);</script>
</body>
</html>
