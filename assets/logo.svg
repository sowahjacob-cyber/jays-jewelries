<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="Jay's Jewelries">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4BC"/>
      <stop offset="35%" style="stop-color:#D4AF37"/>
      <stop offset="70%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="8" width="64" height="64" rx="4" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <text x="36" y="52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="url(#gold)" filter="url(#glow)">JJ</text>
  <text x="88" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#FFFFFF" letter-spacing="0.08em">Jay's</text>
  <text x="88" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="300" fill="#D4AF37" letter-spacing="0.25em">JEWELRIES</text>
  <line x1="88" y1="64" x2="268" y2="64" stroke="url(#gold)" stroke-width="0.5" opacity="0.6"/>
</svg>
