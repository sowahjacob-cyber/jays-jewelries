<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your Jay's Jewelries account — sign in, register, and view order history." />
  <title>My Account | Jay's Jewelries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <nav class="mobile-nav" id="mobile-nav"></nav>
  <main>
    <div class="page-hero-small">
      <div class="container"><h1>My Account</h1></div>
    </div>
    <section class="container" style="padding-bottom:4rem;max-width:720px">
      <div id="auth-section">
        <div class="auth-card">
          <div class="auth-tabs">
            <button type="button" class="active" data-panel="login">Sign In</button>
            <button type="button" data-panel="register">Create Account</button>
          </div>
          <form id="login-form">
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" required minlength="6" />
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          </form>
          <form id="register-form" style="display:none">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="name" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" required />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" name="phone" />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" required minlength="6" />
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
          </form>
        </div>
      </div>
      <div id="account-dashboard" style="display:none">
        <h2 id="user-greeting"></h2>
        <p class="text-muted" style="margin:0.5rem 0 2rem">Manage your orders and profile</p>
        <h3 style="margin-bottom:1rem">Order History</h3>
        <div id="order-list"></div>
        <button type="button" class="btn btn-ghost" id="logout-btn" style="margin-top:2rem">Sign Out</button>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/products.js?v=2"></script>
  <script src="js/store.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>document.addEventListener("DOMContentLoaded", initAccountPage);</script>
</body>
</html>
