<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Promotions | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem"><img src="../assets/logo.svg" width="140" alt="" /></div>
      <a href="index.html" data-page="index">Dashboard</a>
      <a href="products.html" data-page="products">Products</a>
      <a href="orders.html" data-page="orders">Orders</a>
      <a href="customers.html" data-page="customers">Customers</a>
      <a href="promotions.html" data-page="promotions">Promotions</a>
      <a href="#" id="admin-logout" style="margin-top:2rem;color:#e74c3c">Logout</a>
    </aside>
    <div class="admin-main">
      <h1 style="margin-bottom:2rem">Promotions</h1>
      <p class="text-muted" style="margin-bottom:1.5rem">Default codes: <strong class="text-gold">WELCOME10</strong> (10% off), <strong class="text-gold">GOLD20</strong> (20% off, min GH₵500)</p>
      <table class="admin-table">
        <thead><tr><th>Code</th><th>Discount</th><th>Min Order</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="admin-promos-body"></tbody>
      </table>
    </div>
  </div>
  <script src="../js/products.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script>document.addEventListener("DOMContentLoaded", initAdminDashboard);</script>
</body>
</html>
