<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin Dashboard | Jay's Jewelries</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Outfit:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem">
        <img src="../assets/logo.svg" alt="" width="140" />
      </div>
      <a href="index.html" data-page="index">Dashboard</a>
      <a href="products.html" data-page="products">Products</a>
      <a href="orders.html" data-page="orders">Orders</a>
      <a href="customers.html" data-page="customers">Customers</a>
      <a href="promotions.html" data-page="promotions">Promotions</a>
      <a href="#" id="admin-logout" style="margin-top:2rem;color:#e74c3c">Logout</a>
    </aside>
    <div class="admin-main">
      <h1 style="margin-bottom:2rem">Dashboard</h1>
      <div class="stats-grid">
        <div class="stat-card"><h4>Total Revenue</h4><div class="value" id="stat-revenue">—</div></div>
        <div class="stat-card"><h4>Orders</h4><div class="value" id="stat-orders">—</div></div>
        <div class="stat-card"><h4>Customers</h4><div class="value" id="stat-customers">—</div></div>
        <div class="stat-card"><h4>Products</h4><div class="value" id="stat-products">—</div></div>
        <div class="stat-card"><h4>Low Stock</h4><div class="value" id="stat-lowstock">—</div></div>
      </div>
      <h2 style="margin-bottom:1rem">Recent Orders</h2>
      <div style="overflow-x:auto">
        <table class="admin-table">
          <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="admin-orders-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="../js/products.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script>document.addEventListener("DOMContentLoaded", initAdminDashboard);</script>
</body>
</html>
