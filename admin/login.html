<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin Login | Jay's Jewelries</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.5.1/css/all.min.css"/>
</head>
<body class="admin-login-page">
  <div class="admin-login-card">
    <img src="../assets/logo.svg" alt="Jay's Jewelries" width="160" style="margin:0 auto 2rem;display:block" />
    <h2 style="text-align:center;margin-bottom:1.5rem;font-family:var(--font-display)">Admin Dashboard</h2>
    <form id="admin-login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required value="admin@jaysjewelries.com" />
      </div>
       <div class="form-group">
        <label>Password</label>
        
        <input
          type="password"
          id="password"
          name="password"
          required
        />
      </div>
     <div class="show-password-container">
          <input  type="checkbox" id="show-password">
          <label for="show-password">Show Password</label>
    </div>

    
 <button type="submit" class="btn btn-primary btn-block">
      Sign In
    </button>
    </form>
    <p style="text-align:center;margin-top:1.5rem"><a href="../index.html" class="text-muted" style="font-size:0.85rem">← Back to store</a></p>
  </div>
  <script src="../js/products.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script>document.addEventListener("DOMContentLoaded", initAdminLogin);</script>
  <script>
      const passwordInput = document.getElementById("password");
      const showPasswordCheckbox = document.getElementById("show-password");

    showPasswordCheckbox.addEventListener("change",  function() {
        if (this.checked) {
           passwordInput.type ="text";
        } else {
            passwordInput.type = "password";
        }
    });
  </script>
  </body>
</html>
