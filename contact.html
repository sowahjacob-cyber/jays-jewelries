<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Jay's Jewelries — Accra showroom, email, phone, and social media." />
  <title>Contact | Jay's Jewelries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <nav class="mobile-nav" id="mobile-nav"></nav>
  <main>
    <div class="page-hero-small">
      <div class="container">
        <span class="eyebrow">Get in Touch</span>
        <h1>Contact Us</h1>
      </div>
    </div>
    <section>
      <div class="container contact-grid">
        <form id="contact-form" class="reveal" aria-label="Contact form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" />
            </div>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send via WhatsApp</button>
        </form>
        <div class="reveal">
          <div class="contact-info-card" style="margin-bottom:1.5rem">
            <h3>Visit Our Showroom</h3>
            <p class="text-muted" id="contact-address">Labone, Accra, Ghana</p>
          </div>
          <div class="contact-info-card" style="margin-bottom:1.5rem">
            <h3>Call & Email</h3>
            <p><a href="tel:+233533850310" id="contact-phone">+233 533 850310</a></p>
            <p><a href="mailto:jaysjewelriess@gmail.com" id="contact-email">jaysjewelriess@gmail.com</a></p>
          </div>
          <div class="contact-info-card">
            <h3>Follow Us</h3>
            <div class="social-links" id="contact-social"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="js/products.js?v=2"></script>
  <script src="js/store.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("contact-address").textContent = BRAND.address;
      const phone = document.getElementById("contact-phone");
      phone.href = "tel:" + BRAND.phone.replace(/\s/g, "");
      phone.textContent = BRAND.phone;
      const email = document.getElementById("contact-email");
      email.href = "mailto:" + BRAND.email;
      email.textContent = BRAND.email;
      document.getElementById("contact-social").innerHTML =
        renderSocialLinks() +
        `<a href="${whatsappLink()}" target="_blank" rel="noopener">WA</a>`;
      initContactPage();
    });
  </script>
</body>
</html>
